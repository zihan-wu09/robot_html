<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科普智枢 - 个人主页</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="utils/supabase/supabase-config.js"></script>
    <script src="js/jquery.maphilight.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="js/three-vrm.js"></script>
    <script src="shuziren/js/vrm-actions.js"></script>
    <script src="shuziren/js/vrm-core.js"></script>
    <script src="shuziren/js/vrm-profile.js"></script>
<style>
     .user-page {
            background-image: url("images/主页大背景.png"); /* 修改此路径为您自己的图片 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
</style>
</head>
<body>
    <header>
        <h1>科普智枢</h1>
        <ul>
            <li><a href="index.html">首页</a></li>
            <li id="user-link"><a href="denglu-zhuce/denglu-zhuce.html">用户登录与注册</a></li>
            <li><a href="women/women.html">关于我们</a></li>
            <li><a href="fenleijiansuo/fenleijiansuo.html">分类检索</a></li>
            <li><a href="supabase_features/haoyouhudong/haoyouhudong.html">好友互动</a></li>
            <li><a href="tuisong/tuisong.html">内容推送</a></li>
        </ul>
    </header>

    <main class="user-page">
        <div class="user-container">
            <div class="modules-column">
                <!-- 头像 -->
                <div class="user-avatar-wrapper">
                    <div class="user-avatar-large" id="avatar-display"><i class="fas fa-user"></i></div>
                    <button class="avatar-modify-btn" id="avatar-modify-btn"><i class="fas fa-camera"></i></button>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                </div>

                <!-- 用户信息 -->
                <div class="user-info-section">
                    <div class="user-info">
                        <div class="info-item"><label>用户名:</label><span id="user-account"></span></div>
                        <div class="info-item"><label>昵称:</label><input type="text" id="user-nickname" placeholder="请输入昵称"></div>
                        <div class="info-item"><label>手机号:</label><input type="text" id="user-phone" placeholder="请输入手机号"></div>
                        <div class="info-item"><label>邮箱:</label><input type="email" id="user-email" placeholder="请输入邮箱"></div>
                        <div class="info-item"><label>简介:</label><textarea id="user-intro" rows="3" placeholder="介绍一下自己吧~"></textarea></div>
                        <div class="info-item address-item"><label>住址:</label><input type="text" id="user-address" readonly placeholder="自动生成地址"></div>
                        <div class="address-select">
                            <select id="province"><option value="">=请选择省份=</option></select>
                            <select id="city"><option value="">=请选择城市=</option></select>
                            <select id="district"><option value="">=请选择县区=</option></select>
                        </div>
                    </div>
                </div>

                <!-- 机器人足迹 -->
                <div class="user-history-section">
                    <h3>🤖 我的机器人足迹 <small><button class="clear-history-btn" id="clearHistoryBtn">清空记录</button></small></h3>
                    <div class="tab-headers">
                        <span class="tab-header active" data-tab="browse">👀 浏览记录</span>
                        <span class="tab-header" data-tab="search">🔍 搜索记录</span>
                    </div>
                    <div class="tab-content active" id="browse-tab"><ul class="history-list" id="browse-list"></ul></div>
                    <div class="tab-content" id="search-tab"><ul class="history-list" id="search-list"></ul></div>
                </div>

                <!-- 机器人领域标签（持久化保存） -->
                <div class="user-tags-section">
                    <h3>🏷️ 我感兴趣的机器人领域 <span class="tag-limit-hint" id="tagCounter">0/6</span></h3>
                    <div class="tags-container" id="tagsContainer"></div>
                    <div class="tags-actions"><button class="save-tags-btn" id="saveTagsBtn">保存标签</button></div>
                </div>

                <!-- 操作按钮 -->
                <div class="user-actions">
                    <button class="action-btn modify-btn">修改信息</button>
                    <button class="action-btn logout-btn">退出登录</button>
                    <button class="action-btn select-intangible-btn">查找感兴趣的机器人内容</button>
                </div>
            </div>
        </div>
    </main>

    <div id="avatar-container" class="robot-fixed-container" data-btn-position="10px"></div>
    <footer><p><a href="https://baike.baidu.com/item/%E6%9C%BA%E5%99%A8%E4%BA%BA/888">点击这里了解更多机器人知识！</a></p></footer>

    <script>
        // 全国省市区数据（实际使用时请替换为原完整 regionData）
        const regionData = {}; // 占位，实际需完整

        $(document).ready(function() {
            // 登录校验
            let currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                alert('请先登录！');
                window.location.href = 'denglu-zhuce/denglu-zhuce.html';
                return;
            }

            // 头像功能
            const avatarDisplay = $('#avatar-display'), avatarModify = $('#avatar-modify-btn'), avatarInput = $('#avatar-input');
            avatarModify.on('click', () => avatarInput.click());
            function compressImageToDataUrl(file, maxSize) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        const img = new Image();
                        img.onload = () => {
                            const limit = maxSize || 512;
                            let { width, height } = img;
                            if (width > height && width > limit) {
                                height = Math.round(height * (limit / width));
                                width = limit;
                            } else if (height > limit) {
                                width = Math.round(width * (limit / height));
                                height = limit;
                            }
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            // 使用 JPEG 明显减小体积，降低 localStorage 超限概率
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.onerror = () => reject(new Error('图片读取失败'));
                        img.src = ev.target.result;
                    };
                    reader.onerror = () => reject(new Error('文件读取失败'));
                    reader.readAsDataURL(file);
                });
            }

            avatarInput.on('change', async function(e) {
                const file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) { alert('请选择图片文件'); return; }
                try {
                    const compressedDataUrl = await compressImageToDataUrl(file, 512);
                    avatarDisplay.html(`<img src="${compressedDataUrl}" alt="头像">`);
                    localStorage.setItem('avatar_' + currentUser, compressedDataUrl);

                    // 同步到 Supabase，供好友互动等模块读取 user_profiles.avatar
                    if (window.SupabaseAPI?.supabase?.auth) {
                        const { data: { user } } = await window.SupabaseAPI.supabase.auth.getUser();
                        if (user?.id) {
                            await window.SupabaseAPI.supabase
                                .from('user_profiles')
                                .update({ avatar: compressedDataUrl })
                                .eq('id', user.id);
                        }
                    }

                    alert('头像已保存');
                } catch (err) {
                    console.error('头像保存失败:', err);
                    alert('头像保存失败：图片可能过大，请换一张更小的图片重试');
                } finally {
                    // 允许重复选择同一张图时也触发 change
                    avatarInput.val('');
                }
            });
            const savedAvatar = localStorage.getItem('avatar_' + currentUser);
            if (savedAvatar) avatarDisplay.html(`<img src="${savedAvatar}" alt="头像">`);

            // 导航栏
            $('#user-link a').text('个人主页').attr('href', '#');

            // 加载用户信息
            $('#user-account').text(currentUser);
            const userInfo = JSON.parse(localStorage.getItem('userInfo_' + currentUser)) || {};
            if (userInfo.nickname) $('#user-nickname').val(userInfo.nickname);
            if (userInfo.phone) $('#user-phone').val(userInfo.phone);
            if (userInfo.email) $('#user-email').val(userInfo.email);
            if (userInfo.intro) $('#user-intro').val(userInfo.intro);
            if (userInfo.address) $('#user-address').val(userInfo.address);

            // 地址联动（简化版，需regionData）
            function initAddressSelector() {
                const $pro = $('#province'), $city = $('#city'), $dist = $('#district'), $addr = $('#user-address');
                if (!Object.keys(regionData).length) return;
                $pro.empty().append('<option value="">=请选择省份=</option>');
                Object.keys(regionData).forEach(p => $pro.append(`<option value="${p}">${p}</option>`));
                $pro.on('change', function() {
                    const p = $(this).val();
                    $city.empty().append('<option value="">=请选择城市=</option>');
                    $dist.empty().append('<option value="">=请选择县区=</option>');
                    $addr.val('');
                    if (p && regionData[p]) Object.keys(regionData[p]).forEach(c => $city.append(`<option value="${c}">${c}</option>`));
                });
                $city.on('change', function() {
                    const p = $pro.val(), c = $(this).val();
                    $dist.empty().append('<option value="">=请选择县区=</option>');
                    $addr.val('');
                    if (p && c && regionData[p] && regionData[p][c]) regionData[p][c].forEach(d => $dist.append(`<option value="${d}">${d}</option>`));
                });
                $dist.on('change', function() {
                    const p = $pro.val(), c = $city.val(), d = $(this).val();
                    if (p && c && d) $addr.val(`${p}-${c}-${d}`);
                });
                if ($addr.val()) {
                    const [p, c, d] = $addr.val().split('-');
                    if (p && regionData[p]) {
                        $pro.val(p).trigger('change');
                        setTimeout(() => { if (c && regionData[p][c]) $city.val(c).trigger('change'); }, 100);
                        setTimeout(() => { if (d && regionData[p] && regionData[p][c] && regionData[p][c].includes(d)) $dist.val(d).trigger('change'); }, 200);
                    }
                }
            }
            if (Object.keys(regionData).length) initAddressSelector();

            // ========== 机器人主题功能 ==========
            // 1. 标签（九大新分类，支持持久化保存）
            const availableTags = ["主要种类", "发展阶段", "应用场景", "国产机器人明星", "核心零部件", "行动方式种类", "专利数量", "国家级实验室", "有趣知识"];
            // 从 localStorage 读取并过滤掉无效标签（仅保留新分类）
            let selectedTags = JSON.parse(localStorage.getItem('favoriteTags')) || [];
            selectedTags = selectedTags.filter(tag => availableTags.includes(tag));

            function renderTags() {
                const $container = $('#tagsContainer');
                $container.empty();
                availableTags.forEach(tag => {
                    const active = selectedTags.includes(tag) ? 'active' : '';
                    $container.append(`<span class="tag-item ${active}" data-tag="${tag}">${tag}</span>`);
                });
                $('#tagCounter').text(`${selectedTags.length}/6`);
                if (selectedTags.length >= 6) $('.tag-item').not('.active').addClass('disabled');
                else $('.tag-item').removeClass('disabled');
            }
            $('#tagsContainer').on('click', '.tag-item', function() {
                const tag = $(this).data('tag');
                if ($(this).hasClass('active')) {
                    selectedTags = selectedTags.filter(t => t !== tag);
                } else if (selectedTags.length < 6) {
                    if (!selectedTags.includes(tag)) selectedTags.push(tag);
                } else {
                    alert('最多只能选择6个标签哦！');
                    return;
                }
                renderTags();
            });
            $('#saveTagsBtn').on('click', () => {
                localStorage.setItem('favoriteTags', JSON.stringify(selectedTags));
                alert('标签已保存');
            });

            // 2. 浏览/搜索历史（保持原有）
            function initHistory() {
                if (!localStorage.getItem('browseHistory')) localStorage.setItem('browseHistory', JSON.stringify([
                    { name: "工业机器人", time: "2025-03-28 14:30", path: "robot-detail/industrial.html" },
                    { name: "服务机器人发展历程", time: "2025-03-28 10:20", path: "robot-detail/service-evolution.html" },
                    { name: "仿生头部组件", time: "2025-03-27 19:45", path: "robot-detail/bionic-head.html" },
                    { name: "谐波减速器技术", time: "2025-03-27 09:10", path: "robot-detail/harmonic-drive.html" }
                ]));
                if (!localStorage.getItem('searchHistory')) localStorage.setItem('searchHistory', JSON.stringify([
                    { keyword: "工业机器人", time: "2025-03-28 13:20" },
                    { keyword: "减速器", time: "2025-03-28 09:45" },
                    { keyword: "国产机器人明星", time: "2025-03-27 18:30" },
                    { keyword: "行动方式种类", time: "2025-03-27 11:15" }
                ]));
            }
            initHistory();

            function renderBrowseHistory() {
                const list = JSON.parse(localStorage.getItem('browseHistory')) || [];
                const $ul = $('#browse-list').empty();
                if (!list.length) $ul.append('<li class="empty-history">暂无浏览记录，快去浏览机器人内容吧！</li>');
                else list.slice(0, 10).forEach(item => $ul.append(`<li><a href="${item.path}" class="history-item-link" style="color:#d92121;text-decoration:underline;">${item.name}</a><span class="history-item-time">${item.time}</span></li>`));
            }
            function renderSearchHistory() {
                const list = JSON.parse(localStorage.getItem('searchHistory')) || [];
                const $ul = $('#search-list').empty();
                if (!list.length) {
                    $ul.append('<li class="empty-history">暂无搜索记录，<a href="fenleijiansuo/fenleijiansuo.html" style="color:#d92121;">快去分类检索页面搜索吧</a>！</li>');
                } else {
                    list.slice(0, 10).forEach(item => $ul.append(`<li><a href="javascript:void(0)" class="history-search-link" data-keyword="${item.keyword}">🔍 "${item.keyword}"</a><span class="history-item-time">${item.time}</span></li>`));
                    $('.history-search-link').off().on('click', function() {
                        const kw = $(this).data('keyword');
                        if (kw) window.location.href = `fenleijiansuo/fenleijiansuo.html?search=${encodeURIComponent(kw)}`;
                    });
                }
            }

            $('#clearHistoryBtn').on('click', function() {
                const active = $('.tab-header.active').data('tab');
                if (active === 'browse') {
                    if (confirm('清空浏览记录？')) { localStorage.setItem('browseHistory', '[]'); renderBrowseHistory(); }
                } else {
                    if (confirm('清空搜索记录？')) { localStorage.setItem('searchHistory', '[]'); renderSearchHistory(); }
                }
            });
            $('.tab-header').on('click', function() {
                $('.tab-header').removeClass('active');
                $(this).addClass('active');
                $('.tab-content').removeClass('active');
                if ($(this).data('tab') === 'browse') $('#browse-tab').addClass('active');
                else $('#search-tab').addClass('active');
            });

            // 3. 按钮跳转
            $('.select-intangible-btn').on('click', () => {
                localStorage.setItem('favoriteTags', JSON.stringify(selectedTags));
                const tagsParam = selectedTags.join(',');
                let url = 'fenleijiansuo/fenleijiansuo.html';
                if (tagsParam) url += `?tags=${encodeURIComponent(tagsParam)}`;
                window.location.href = url;
            });
            $('.modify-btn').on('click', () => {
                const info = {
                    nickname: $('#user-nickname').val(),
                    phone: $('#user-phone').val(),
                    email: $('#user-email').val(),
                    intro: $('#user-intro').val(),
                    address: $('#user-address').val()
                };
                localStorage.setItem('userInfo_' + currentUser, JSON.stringify(info));
                alert('信息已保存');
            });
            $('.logout-btn').on('click', async () => {
                try {
                    if (window.SupabaseAPI?.supabase?.auth) {
                        await window.SupabaseAPI.supabase.auth.signOut();
                    }
                } catch (e) {
                    console.warn('Supabase退出异常:', e);
                }
                localStorage.removeItem('currentUser');
                localStorage.removeItem('supabase_user');
                alert('已退出');
                window.location.href = 'denglu-zhuce/denglu-zhuce.html';
            });

            // 初始化渲染
            renderTags();
            renderBrowseHistory();
            renderSearchHistory();
        });
    </script>
</body>
</html>
