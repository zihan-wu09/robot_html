<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习路线详情 - 科普智枢</title>
    <link rel="stylesheet" href="tuisong.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .route-detail-card {
            background: #fff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(12, 36, 91, 0.24);
        }
        .route-detail-image {
            display: block;
            width: 100%;
            height: 260px;
            border-radius: 14px;
            margin-bottom: 20px;
            object-fit: cover;
            background-color: #dbeafe;
        }
        .route-day-title {
            font-size: 20px;
            color: #1f4fbf;
            margin: 24px 0 12px;
            border-left: 4px solid #2a7fff;
            padding-left: 10px;
        }
        .route-step {
            background: #f3f7ff;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 18px;
            color: #fff;
            background: #2a7fff;
            padding: 9px 16px;
            border-radius: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<header>
    <h1>科普智枢</h1>
    <ul>
        <li><a href="../index.html">首页</a></li>
        <li id="user-link"><a href="../denglu-zhuce/denglu-zhuce.html">用户登录与注册</a></li>
        <li><a href="../women/women.html">关于我们</a></li>
        <li><a href="../fenleijiansuo/fenleijiansuo.html">分类检索</a></li>
        <li><a href="../supabase_features/haoyouhudong/haoyouhudong.html">好友互动</a></li>
        <li><a href="./tuisong.html">内容推送</a></li>
    </ul>
</header>

<main class="main-content">
    <a href="./tuisong.html" class="back-btn"><i class="fas fa-arrow-left"></i> 返回为你推荐</a>
    <h2 id="topicTitle" class="section-title"></h2>
    <div class="route-detail-card">
        <img id="detailImage" class="route-detail-image" alt="">
        <div id="routeDetailContent"></div>
    </div>
</main>

<footer>
    <p><a href="https://baike.baidu.com/item/%E6%9C%BA%E5%99%A8%E4%BA%BA/888">点击这里了解更多机器人知识！</a></p>
</footer>

<script src="../公共渲染页面/robot-topics-data.js"></script>
<script src="./tuisong-shared.js"></script>
<script>
    (function() {
        var currentUserForGuard = localStorage.getItem('currentUser');
        if (!currentUserForGuard) {
            alert('请先登录后使用内容推送功能');
            window.location.href = '../denglu-zhuce/denglu-zhuce.html';
            return;
        }

        var Snav = window.TUISONG_SHARED;
        if (Snav && Snav.updateTuisongNav) {
            Snav.updateTuisongNav();
        } else {
            var userLink = document.getElementById('user-link');
            if (userLink) {
                var currentUser = localStorage.getItem('currentUser');
                userLink.innerHTML = currentUser
                    ? '<a href="../profile.html">个人主页</a>'
                    : '<a href="../denglu-zhuce/denglu-zhuce.html">用户登录与注册</a>';
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const topicKey = decodeURIComponent(urlParams.get('topic') || '');
        const days = Math.max(1, Math.min(3, parseInt(urlParams.get('days'), 10) || 1));
        const topic = window.ROBOT_TOPICS && window.ROBOT_TOPICS[topicKey];

        const titleEl = document.getElementById('topicTitle');
        const imageEl = document.getElementById('detailImage');
        const contentEl = document.getElementById('routeDetailContent');

        if (!topic) {
            titleEl.textContent = '未找到对应学习路线';
            contentEl.innerHTML = '<div class="route-step">请返回内容推送页面重新选择路线。</div>';
            return;
        }

        titleEl.textContent = `${topic.title} · ${days}日学习路线`;
        var Sim = window.TUISONG_SHARED;
        if (Sim && Sim.bindTopicImageElement) {
            Sim.bindTopicImageElement(imageEl, topicKey, 0);
        } else {
            imageEl.src = '../images/主页大背景.png';
        }

        const list = Array.isArray(topic.items) ? topic.items : [];
        if (!list.length) {
            contentEl.innerHTML = '<div class="route-step">当前主题暂无学习内容，稍后再试。</div>';
            return;
        }

        const perDay = Math.max(1, Math.ceil(list.length / days));
        let html = '';
        for (let d = 0; d < days; d++) {
            const part = list.slice(d * perDay, (d + 1) * perDay);
            if (!part.length) {
                continue;
            }
            html += `<h3 class="route-day-title">第${d + 1}天</h3>`;
            part.forEach((item, idx) => {
                const desc = item.desc || item.meta || '建议阅读该主题的基础知识';
                const meta = item.meta ? `<br><small>${item.meta}</small>` : '';
                html += `<div class="route-step">${idx + 1}. <strong>${item.title}</strong><br>${desc}${meta}</div>`;
            });
        }
        contentEl.innerHTML = html;
    })();
</script>
</body>
</html>
