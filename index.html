        /* 覆盖原有city-info-card样式，改为蓝色科技风九宫格 */
        .city-info-card {
            position: absolute;
            left: 500px;
            top: 120px;
            width: 520px;
            background: rgba(10, 25, 55, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(0, 255, 255, 0.1) inset;
            padding: 20px 25px;
            z-index: 10;
            color: #e0f2fe;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        .city-info-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #00ffff, #0066ff);
            border-radius: 30px;
            z-index: -1;
            opacity: 0.4;
            filter: blur(4px);
        }
        .city-info-content h3 {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #fff, #88ddff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0,255,255,0.5);
        }
        .grid-9 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin: 20px 0 15px;
        }
        .stat-card-link {
            text-decoration: none;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card {
            background: rgba(0, 20, 40, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
            transition: inherit;
            border: 1px solid rgba(0, 200, 255, 0.3);
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .stat-card-link:hover .stat-card {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,150,255,0.2);
            border-color: rgba(0,255,255,0.6);
        }
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #88ddff, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0,200,255,0.3);
        }
        .stat-label {
            font-size: 14px;
            letter-spacing: 1px;
            color: #bbddff;
            font-weight: 500;
        }
        .card-footer {
            text-align: center;
            font-size: 14px;
            color: #88ccff;
            border-top: 1px solid rgba(0,255,255,0.3);
            padding-top: 12px;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        @media (max-width: 1400px) {
            .city-info-card {
                left: 520px;
                width: 480px;
            }
        }
        @media (max-width: 1200px) {
            .city-info-card {
                left: 50%;
                transform: translateX(-50%);
                top: 200px;
                width: 460px;
            }
            .grid-9 {
                gap: 12px;
            }
            .stat-number {
                font-size: 28px;
            }
        }
        .map-img { cursor: pointer; }
        area { cursor: pointer; }
        canvas { pointer-events: none !important; }
    </style>
