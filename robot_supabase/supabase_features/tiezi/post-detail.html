<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 机器人科普</title>
    <link rel="stylesheet" href="../haoyouhudong/haoyouhudong.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #f5f5f5;
            padding-bottom: 80px;
        }

        /* 顶部小导航栏（返回按钮 + 标题） */
        .top-bar {
            position: fixed;
            top: 80px;
            left: 0; right: 0;
            height: 46px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #eee;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .top-bar-title {
            flex: 1;
            text-align: center;
            font-weight: 500;
            font-size: 16px;
            color: #333;
        }
        .back-btn {
            font-size: 18px;
            background: none;
            border: none;
            cursor: pointer;
            color: #555;
            padding: 4px 8px;
        }
        .back-btn:hover { color: #333; }

        /* 帖子主卡片 */
        .post-card {
            background: white;
            margin: 136px 15px 15px;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        #avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
        }
        .user-info { flex: 1; }
        #nickname {
            font-weight: 600;
            font-size: 15px;
            color: #333;
            margin-bottom: 2px;
        }
        #time {
            color: #999;
            font-size: 12px;
        }

        /* 帖子内容 */
        #content {
            font-size: 16px;
            line-height: 1.7;
            color: #333;
            margin: 12px 0;
            white-space: pre-wrap;
        }

        /* 帖子图片 */
        #images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin: 10px 0;
        }
        #images img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 6px;
        }

        /* 操作栏 */
        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            margin: 12px 0;
        }
        #deleteBtn {
            background: none;
            border: none;
            color: #ff4444;
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 5px;
        }
        #deleteBtn:hover { opacity: 0.75; }
        #likeBtn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        #likeBtn:hover { background: #fff0f0; }
        #likeBtn.liked { color: #ff4444; }

        /* 点赞用户列表 */
        .like-list {
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .like-list-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }
        #likeUsers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .like-user {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #555;
        }
        .like-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* 评论区 */
        .comment-section {
            margin-top: 14px;
        }
        .comment-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .comment-item {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
        }
        .comment-item:hover { background: #fafafa; border-radius: 8px; }
        .comment-item.reply-item {
            margin-left: 32px;
            border-left: 2px solid #e0e0e0;
            padding-left: 10px;
        }
        .comment-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .comment-content { flex: 1; }
        .comment-nickname {
            font-weight: 600;
            font-size: 14px;
            color: #333;
            margin-bottom: 3px;
        }
        .comment-text {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 5px;
        }
        .comment-text i { color: #bbb; font-size: 11px; margin-top: 3px; }

        /* 固定评论输入栏 */
        .comment-input-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 10px 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            z-index: 200;
        }
        #commentInput {
            flex: 1;
            border-radius: 22px;
            padding: 9px 14px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            background: #f7f7f7;
        }
        #commentInput:focus { border-color: #667eea; background: #fff; }
        .send-btn {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 22px;
            padding: 0 18px;
            cursor: pointer;
            font-size: 14px;
        }

        /* 删除帖子弹窗 */
        #deleteModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #deleteModal .modal-content {
            background: white;
            width: 80%;
            max-width: 300px;
            border-radius: 14px;
            overflow: hidden;
        }
        .modal-title {
            padding: 20px;
            text-align: center;
            font-size: 16px;
            color: #333;
        }
        .modal-actions {
            display: flex;
            border-top: 1px solid #eee;
        }
        .modal-btn {
            flex: 1;
            padding: 13px;
            text-align: center;
            background: none;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }
        .modal-btn.cancel { color: #666; border-right: 1px solid #eee; }
        .modal-btn.confirm { color: #ff4444; font-weight: 600; }

        /* 评论操作弹窗 */
        #commentModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }
        #commentModal .modal-content {
            background: white;
            width: 80%;
            max-width: 300px;
            border-radius: 14px;
            overflow: hidden;
        }
        #modalPrimaryBtn, #modalCancelBtn {
            display: block;
            width: 100%;
            padding: 14px;
            text-align: center;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        #modalPrimaryBtn:last-child, #modalCancelBtn:last-child { border-bottom: none; }
        #modalPrimaryBtn.danger { color: #ff4444; font-weight: 600; }
        #modalPrimaryBtn.primary { color: #007aff; font-weight: 600; }
        #modalCancelBtn { color: #666; }
    </style>
</head>
<body>
    <!-- 顶部固定导航 -->
    <header>
        <h1>机器人科普</h1>
        <ul>
            <li><a href="../../../index.html">首页</a></li>
            <li id="user-link"><a href="../denglu-zhuce/denglu-zhuce.html">用户登录与注册</a></li>
            <li><a href="../../../women/women.html">关于我们</a></li>
            <li><a href="../../../fenleijiansuo/fenleijiansuo.html">分类检索</a></li>
            <li><a href="../haoyouhudong/haoyouhudong.html">好友互动</a></li>
            <li><a href="../../tuisong/tuisong.html">内容推送</a></li>
        </ul>
    </header>

    <!-- 二级顶栏：返回 + 标题 -->
    <div class="top-bar">
        <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <div class="top-bar-title">帖子详情</div>
        <div style="width:36px;"></div>
    </div>

    <!-- 帖子主体 -->
    <div class="post-card">
        <!-- 作者信息 -->
        <div class="post-header">
            <img id="avatar" src="" alt="">
            <div class="user-info">
                <div id="nickname">加载中...</div>
                <div id="time"></div>
            </div>
        </div>

        <!-- 帖子内容 -->
        <div id="content"></div>

        <!-- 帖子图片 -->
        <div id="images"></div>

        <!-- 操作栏：删除 + 点赞 -->
        <div class="post-actions">
            <button id="deleteBtn" onclick="openModal()">
                <i class="fa-solid fa-trash"></i> 删除帖子
            </button>
            <button id="likeBtn" onclick="toggleLike()">
                <i class="fa-solid fa-heart"></i>
                <span id="likeText">点赞</span>
            </button>
        </div>

        <!-- 点赞用户列表 -->
        <div class="like-list">
            <div class="like-list-title">点赞过的人</div>
            <div id="likeUsers"><span style="color:#999;font-size:13px;">暂无点赞</span></div>
        </div>

        <!-- 评论区 -->
        <div class="comment-section">
            <div class="comment-section-title">评论</div>
            <div id="commentList">
                <div style="color:#999;padding:10px 0;font-size:14px;">暂无评论</div>
            </div>
        </div>
    </div>

    <!-- 底部固定评论输入栏 -->
    <div class="comment-input-bar">
        <input id="commentInput" placeholder="说点什么...">
        <button class="send-btn" onclick="sendComment()">发送</button>
    </div>

    <!-- 删除帖子确认弹窗 -->
    <div id="deleteModal">
        <div class="modal-content">
            <div class="modal-title">确定删除此帖子？</div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" onclick="deletePost()">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 评论操作弹窗（删除/回复） -->
    <div id="commentModal">
        <div class="modal-content">
            <button id="modalPrimaryBtn" onclick="handleCommentAction()"></button>
            <button id="modalCancelBtn" onclick="closeCommentModal()">取消</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../utils/supabase/supabase-config.js"></script>
    <script src="./post-detail.js"></script>
</body>
</html>
