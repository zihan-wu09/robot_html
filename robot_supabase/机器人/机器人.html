<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人知识 - 九大主题 - 科普智枢</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/museum-tokens.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/robot-hub.css">
    <script src="../js/auth.js"></script>
    <script src="js/robot-topics-data.js"></script>
    <script>
        (function () {
            var p = new URLSearchParams(window.location.search);
            var cat = p.get('category');
            if (cat && window.ROBOT_CATEGORY_TO_TOPIC_FILE && window.ROBOT_CATEGORY_TO_TOPIC_FILE[cat]) {
                var file = window.ROBOT_CATEGORY_TO_TOPIC_FILE[cat];
                var item = p.get('item');
                var q = item ? ('?item=' + encodeURIComponent(item)) : '';
                window.location.replace(file + q);
            }
        })();
    </script>
</head>
<body class="robot-hub-body museum-font-body">
    <header>
        <h1>科普智枢</h1>
        <ul>
            <li><a href="../index.html">首页</a></li>
            <li id="user-link"><a href="../denglu-zhuce/denglu-zhuce.html">用户登录与注册</a></li>
            <li><a href="../women/women.html">关于我们</a></li>
            <li><a href="../fenleijiansuo/fenleijiansuo.html">分类检索</a></li>
        </ul>
    </header>

    <main class="robot-hub-main">
        <section class="robot-hub-hero" aria-labelledby="hub-main-title">
            <h2 id="hub-main-title" class="robot-hub-hero-title museum-font-heading">机器人知识 · 九大主题</h2>
            <p class="robot-hub-hero-sub">按主题进入分类知识页：从种类与发展阶段，到场景、零部件与趣闻。</p>
        </section>
        <div class="hub-grid" id="hub-grid"></div>
    </main>

    <footer>
        <p><a href="https://baike.baidu.com/item/%E6%9C%BA%E5%99%A8%E4%BA%BA/888">点击这里了解更多机器人知识！</a></p>
    </footer>

    <script>
        (function () {
            function esc(s) {
                if (!s) return '';
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }
            function renderHub() {
                var order = window.ROBOT_TOPIC_ORDER || [];
                var topics = window.ROBOT_TOPICS || {};
                var files = window.ROBOT_TOPIC_KEY_TO_FILE || {};
                var el = document.getElementById('hub-grid');
                if (!el) return;
                var html = '';
                var svgs = window.ROBOT_HUB_SVGS || {};
                order.forEach(function (key) {
                    var t = topics[key];
                    var file = files[key];
                    if (!t || !file) return;
                    var badge = t.statBadge != null ? t.statBadge : String((t.items && t.items.length) || '');
                    var blurb = t.hubBlurb ? esc(t.hubBlurb) : '';
                    var glyph = svgs[key] || '';
                    html +=
                        '<a href="' +
                        esc(file) +
                        '" class="hub-card-link">' +
                        '<div class="hub-card">' +
                        '<div class="hub-card-head">' +
                        (glyph ? '<span class="hub-card-icon" aria-hidden="true">' + glyph + '</span>' : '') +
                        '<div class="hub-label">' + esc(t.title) + '</div>' +
                        '<div class="hub-stat museum-num">' + esc(badge) + '</div></div>' +
                        (blurb ? '<p class="hub-blurb">' + blurb + '</p>' : '') +
                        '</div></a>';
                });
                el.innerHTML = html;
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', renderHub);
            } else {
                renderHub();
            }
        })();
    </script>
</body>
</html>
