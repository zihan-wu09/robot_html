            { name: "医疗机器人", category: "有趣知识", col1: "达芬奇手术系统", col2: "微创手术，精准操作", summary: "医疗科技革命" },
            { name: "机器人奥运会", category: "有趣知识", col1: "RoboCup", col2: "足球机器人、救援机器人比赛", summary: "科技竞技" },

            { name: "情感机器人", category: "有趣知识", col1: "Pepper、索菲亚", col2: "能识别情绪，与人交流", summary: "人机交互前沿" }

        const columnHeaders = {
            "主要种类": { col1: "技术特点", col2: "典型应用" },
            "发展阶段": { col1: "时间阶段", col2: "核心特征" },
            "应用场景": { col1: "典型技术", col2: "落地行业" },
            "国产机器人明星": { col1: "核心产品", col2: "技术优势" },
            "核心零部件": { col1: "关键技术参数", col2: "主要应用" },
            "行动方式种类": { col1: "行动方式", col2: "代表应用" },
            "专利数量": { col1: "专利领域", col2: "累计数量/增长率" },
            "国家级实验室": { col1: "依托单位", col2: "研究方向" },
            "有趣知识": { col1: "知识标题", col2: "趣味说明" }
        };
        const defaultHeaders = { col1: "所属范畴", col2: "核心价值/特征" };

        $(document).ready(function() {
            let currentPage = 1;
            const pageSize = 10;
            let currentFilteredData = [];
            let tagFilterList = null;
            let lastTagFilterList = null;

            function saveSearchHistory(keyword) {
                if (!keyword || keyword.trim() === '') return;
                let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
                const now = new Date();
                const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                if (history.length > 0 && history[0].keyword === keyword.trim() && (Date.now() - new Date(history[0].time).getTime()) < 3000) {
                    return;
                }
                history.unshift({ keyword: keyword.trim(), time: timeStr });
                if (history.length > 30) history = history.slice(0, 30);
                localStorage.setItem('searchHistory', JSON.stringify(history));
            }

            function getCurrentHeaders(category) {
                if (!category) return defaultHeaders;
                return columnHeaders[category] || defaultHeaders;
            }

            function renderTable() {
                const category = $("#categorySelect").val();
                const headers = getCurrentHeaders(category);
                $("#tableHeader").html(`
                    <tr><th>序号</th><th>具体名称</th><th>分类</th><th>${headers.col1}</th><th>${headers.col2}</th></tr>
                `);
                const tbody = $('#heritage-tbody').empty();
                const total = currentFilteredData.length;
                if (total === 0) {
                    tbody.append('<tr><td colspan="5" style="text-align:center;">暂无相关机器人数据</td></tr>');
                    renderPagination();
                    return;
                }
                const start = (currentPage - 1) * pageSize;
                const pageData = currentFilteredData.slice(start, start + pageSize);
                pageData.forEach((item, i) => {
                    let col1Value, col2Value;
                    if (!category) {
                        col1Value = item.category;
                        col2Value = item.summary || (item.col1 || '') + (item.col2 ? '；' + item.col2 : '');
                    } else {
                        col1Value = item.col1 || '-';
                        col2Value = item.col2 || '-';
                    }
                    const tr = $(`
                        <tr>
                            <td>${start + i + 1}</td>
                            <td class="name" data-name="${item.name.replace(/"/g, '&quot;')}">${item.name}</td>
                            <td>${item.category}</td>
                            <td>${col1Value}</td>
                            <td>${col2Value}</td>
                        </tr>
                    `);
                    tbody.append(tr);
                });
                tbody.off('click', '.name').on('click', '.name', function () {
                    const name = $(this).data('name');
                    saveSearchState();
                    addBrowseRecord(name);
                    location.href = `../robot-detail/detail.html?name=${encodeURIComponent(name)}`;
                });
                renderPagination();
            }

            function renderPagination() {
                const el = $('#pagination').empty();
                const total = currentFilteredData.length;
                const totalPages = Math.ceil(total / pageSize);
                if (totalPages <= 1) return;
                const btn = (txt, disabled = false, active = false, fn) => {
                    const b = $(`<button>${txt}</button>`);
                    if (disabled) b.prop('disabled', true);
                    if (active) b.addClass('active');
                    if (fn) b.on('click', fn);
                    return b;
                };
                el.append(btn('首页', currentPage === 1, false, () => { currentPage = 1; renderTable(); }));
                el.append(btn('上一页', currentPage === 1, false, () => { if (currentPage > 1) { currentPage--; renderTable(); } }));
                const pages = new Set();
                pages.add(1);
                for (let i = Math.max(2, currentPage - 2); i <= Math.min(totalPages - 1, currentPage + 2); i++) pages.add(i);
                pages.add(totalPages);
                const arr = [...pages].sort((a, b) => a - b);
                let last = 0;
                arr.forEach(p => {
                    if (last + 1 < p) el.append(btn('...', false, false, () => {
                        const t = prompt(`输入页码（1-${totalPages}）`);
                        const num = parseInt(t);
                        if (num >= 1 && num <= totalPages) { currentPage = num; renderTable(); }
                    }));
                    el.append(btn(p, false, p === currentPage, () => { currentPage = p; renderTable(); }));
                    last = p;
                });
                el.append(btn('下一页', currentPage === totalPages, false, () => { if (currentPage < totalPages) { currentPage++; renderTable(); } }));
                el.append(btn('末页', currentPage === totalPages, false, () => { currentPage = totalPages; renderTable(); }));
            }

            function performSearch(saveHistory = false) {
                const category = $("#categorySelect").val();
                const keyword = $("#searchInput").val().trim().toLowerCase();
                if (saveHistory && keyword) {
                    saveSearchHistory(keyword);
                }
                currentFilteredData = robotData.filter(item => {
                    let categoryMatch = true;
                    if (tagFilterList && tagFilterList.length > 0) {
                        categoryMatch = tagFilterList.includes(item.category);
                    } else {
                        categoryMatch = !category || item.category === category;
                    }
                    const keyMatch = !keyword ||
                        item.name.toLowerCase().includes(keyword) ||
                        item.category.toLowerCase().includes(keyword) ||
                        (item.col1 && item.col1.toLowerCase().includes(keyword)) ||
                        (item.col2 && item.col2.toLowerCase().includes(keyword)) ||
                        (item.summary && item.summary.toLowerCase().includes(keyword));
                    return categoryMatch && keyMatch;
                });
                currentPage = 1;
                renderTable();
                saveSearchState();
                updateFilterTip();
            }

            function updateFilterTip() {
                let tipHtml = '';
                if (tagFilterList && tagFilterList.length > 0) {
                    tipHtml = `当前按标签筛选：<strong>${tagFilterList.join('、')}</strong> `;
                    tipHtml += `<button class="dynamic-tag-btn clear-btn" id="dynamicTagBtn">清除标签筛选</button>`;
                    $('#filter-tip').html(tipHtml).show();
                } else if (lastTagFilterList && lastTagFilterList.length > 0) {
                    tipHtml = `已清除标签筛选，可点击恢复：`;
                    tipHtml += `<button class="dynamic-tag-btn restore-btn" id="dynamicTagBtn">恢复标签筛选</button>`;
                    $('#filter-tip').html(tipHtml).show();
                } else {
                    const category = $("#categorySelect").val();
                    if (category) {
                        tipHtml = `当前分类：<strong>${category}</strong>  |  共 ${currentFilteredData.length} 条数据`;
                        $('#filter-tip').html(tipHtml).show();
                    } else if ($("#searchInput").val().trim()) {
                        tipHtml = `当前搜索：<strong>${$("#searchInput").val().trim()}</strong>  |  共 ${currentFilteredData.length} 条数据`;
                        $('#filter-tip').html(tipHtml).show();
                    } else {
                        $('#filter-tip').hide();
                    }
                }
                $('#dynamicTagBtn').off('click').on('click', function() {
                    if (tagFilterList && tagFilterList.length > 0) {
                        clearTagFilter();
                    } else if (lastTagFilterList && lastTagFilterList.length > 0) {
                        restoreTagFilter();
                    }
                });
            }

            function clearTagFilter() {
                if (tagFilterList && tagFilterList.length > 0) {
                    lastTagFilterList = [...tagFilterList];
                }
                tagFilterList = null;
                sessionStorage.removeItem('robotTagFilter');
                $("#categorySelect").val('');
                performSearch(false);
            }

            function restoreTagFilter() {
                if (lastTagFilterList && lastTagFilterList.length > 0) {
                    tagFilterList = [...lastTagFilterList];
                    sessionStorage.setItem('robotTagFilter', tagFilterList.join(','));
                    $("#categorySelect").val('');
                    performSearch(false);
                } else {
                    alert('没有可恢复的标签筛选记录');
                }
            }

            function saveSearchState() {
                const state = {
                    category: $("#categorySelect").val(),
                    keyword: $("#searchInput").val().trim(),
                    page: currentPage,
                    tagFilter: tagFilterList ? tagFilterList.join(',') : null,
                    lastTagFilter: lastTagFilterList ? lastTagFilterList.join(',') : null,
                    timestamp: Date.now()
                };
                localStorage.setItem('robotSearchState', JSON.stringify(state));
            }

            function restoreSearchState() {
                const savedState = JSON.parse(localStorage.getItem('robotSearchState'));
                if (!savedState) return;
                $("#categorySelect").val(savedState.category || '');
                $("#searchInput").val(savedState.keyword || '');
                currentPage = savedState.page || 1;
                if (savedState.tagFilter) {
                    tagFilterList = savedState.tagFilter.split(',');
                } else {
                    tagFilterList = null;
                }
                if (savedState.lastTagFilter) {
                    lastTagFilterList = savedState.lastTagFilter.split(',');
                } else {
                    lastTagFilterList = null;
                }
                performSearch(false);
            }

            $("#clear-search-state").on('click', function() {
                localStorage.removeItem('robotSearchState');
                $("#categorySelect").val('');
                $("#searchInput").val('');
                currentPage = 1;
                tagFilterList = null;
                lastTagFilterList = null;
                sessionStorage.removeItem('robotTagFilter');
                performSearch(false);
                alert('已清除所有搜索状态，已重置为全部数据');
            });

            $("#search-btn").on('click', () => {
                if (tagFilterList) clearTagFilter();
                performSearch(true);
            });
            $("#searchInput").keypress(e => e.which === 13 && (() => {
                if (tagFilterList) clearTagFilter();
                performSearch(true);
            })());
            $("#categorySelect").change(() => {
                if (tagFilterList) clearTagFilter();
                performSearch(false);
            });

            function getCurrentTime() {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            }
            function addBrowseRecord(itemName) {
                if (!itemName) return;
                let browseHistory = JSON.parse(localStorage.getItem('browseHistory')) || [];
                const currentTime = getCurrentTime();
                const detailPath = `../robot-detail/detail.html?name=${encodeURIComponent(itemName)}`;
                const existingIndex = browseHistory.findIndex(record => record.name === itemName);
                if (existingIndex !== -1) browseHistory.splice(existingIndex, 1);
                browseHistory.unshift({ name: itemName, time: currentTime, path: detailPath });
                if (browseHistory.length > 30) browseHistory = browseHistory.slice(0, 30);
                localStorage.setItem('browseHistory', JSON.stringify(browseHistory));
            }

            function handleUrlParams() {
                const urlParams = new URLSearchParams(window.location.search);
                const tagsParam = urlParams.get('tags');
                const searchKeyword = urlParams.get('search');
                if (tagsParam) {
                    const tagArray = tagsParam.split(',').filter(t => t.trim());
                    if (tagArray.length > 0) {
                        tagFilterList = tagArray;
                        sessionStorage.setItem('robotTagFilter', tagArray.join(','));
                        $("#categorySelect").val('');
                    }
                } else if (searchKeyword) {
                    const keyword = decodeURIComponent(searchKeyword);
                    $("#searchInput").val(keyword);
                }
                if (!tagFilterList) {
                    const savedTagFilter = sessionStorage.getItem('robotTagFilter');
                    if (savedTagFilter) {
                        tagFilterList = savedTagFilter.split(',');
                        $("#categorySelect").val('');
                    }
                }
            }

            handleUrlParams();
            const hasUrlSearch = (new URLSearchParams(window.location.search)).has('search');
            if (!hasUrlSearch && !tagFilterList) {
                restoreSearchState();
                if (!localStorage.getItem('robotSearchState')) {
                    performSearch(false);
                }
            } else {
                performSearch(false);
            }
        });
    </script>
</body>
</html>
