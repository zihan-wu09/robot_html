                    <div class="intro-text">
                        <h2>黄山市非遗介绍</h2>
                        <h3>什么是黄山非遗？</h3>
                        <p>黄山市是徽文化的核心发源地，孕育了丰富的非物质文化遗产。这里有徽墨、歙砚、徽州三雕等传统技艺，也有徽剧、傩舞等传统艺术，更有徽菜、新安医学等民俗与医药文化。</p>
                        <p>黄山非遗始于唐宋，盛于明清，至今仍在徽州大地活态传承。2006年起，多项黄山非遗先后入选国家级、省级非遗名录，是中华传统文化的瑰宝。</p>
                    </div>

            </div>

        <section class="heritage-slider-section">
            <div class="container">
                <h2 class="section-title">黄山非遗精粹</h2>
                <div class="heritage-category-list" id="heritageCategoryList"></div>
    <div id="avatar-container" style="position: absolute; top: 50%; right: 80px; transform: translateY(-50%); width: 220px; height: 330px; z-index: 20; cursor: pointer; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: rgba(0,0,0,0.1);">

    <script>
        $(document).ready(function() {
            $('.map-img').maphilight({
                fill: true,
                fillColor: 'ffcc00',
                fillOpacity: 0.5,
                stroke: true,
                strokeColor: 'ffffff',
                strokeWidth: 2,
                fade: true
            });
            $('canvas').css('pointer-events', 'none');
        });
  // ========== 核心新增：通用浏览记录函数 ==========
        function addBrowseHistory(name) {
            // 1. 构造蚌埠非遗详情页的完整路径（从profile.html出发）
            const fullPath = `../detail/detail.html?name=${encodeURIComponent(name)}`;
            // 2. 读取已有浏览记录
            let browseHistory = JSON.parse(localStorage.getItem('browseHistory')) || [];
            // 3. 去重：删除同名旧记录，避免重复
            browseHistory = browseHistory.filter(item => item.name !== name);
            // 4. 添加新记录（最新的在最前面）
            browseHistory.unshift({
                name: name,
                time: new Date().toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit', 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                }), // 格式化时间，显示更规范
                path: fullPath // 关键：存储带参数的真实跳转路径
            });
            // 5. 限制最多存储20条记录，防止数据冗余
            browseHistory = browseHistory.slice(0, 20);
            // 6. 保存回本地存储
            localStorage.setItem('browseHistory', JSON.stringify(browseHistory));
        }
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('heritageCategoryList');
            // 图片映射 - 修改为指向根目录 images/
            const imageMap = {
                "徽墨制作技艺": "../images/徽墨.jpg",
                "祁门红茶制作技艺": "../images/祁门红茶.jpg",
                "徽州民歌": "../images/徽州民歌.jpg",
                "徽州民谣": "../images/徽州民谣.jpg",
                "徽州楹联匾额": "../images/徽州楹联匾额.jpg",
                "齐云山道教音乐": "../images/齐云山道教音乐.jpg",
                "黎阳仗鼓": "../images/黎阳仗鼓.jpg",
                "祁门傩舞": "../images/祁门傩舞.jpg",
                "徽派版画": "../images/徽派版画.jpg",
                "徽州篆刻": "../images/徽州篆刻.jpg",
                "徽州漆器制作技艺": "../images/徽州漆器.jpg",
                "徽州建筑技艺": "../images/徽州建筑.jpg",
                "徽派盆景技艺": "../images/徽派盆景.jpg",
                "绿茶制作技艺（黄山毛峰、太平猴魁、屯溪绿茶、松萝茶、六安瓜片、霍山黄芽）": "../images/绿茶制作技艺.jpg",
                "新安医学": "../images/新安医学.jpg",
                "徽菜": "../images/徽菜.jpg",
                "程大位珠算法": "../images/程大位珠算法.jpg",
                "徽州祠祭": "../images/徽州祠祭.jpg",
                "轩辕车会": "../images/轩辕车会.jpg",
                "竹编（王河舒席、徽州竹编）": "../images/竹编.jpg",
                "抬阁（肘阁、湖村抬阁、隆阜抬阁）": "../images/抬阁.jpg",
                "徽州板凳龙": "../images/徽州板凳龙.jpg",
                "采茶扑蝶舞": "../images/采茶扑蝶舞.jpg",
                "叶村叠罗汉": "../images/叶村叠罗汉.jpg",
                "徽州根雕": "../images/徽州根雕.jpg",
                "徽州竹雕": "../images/徽州竹雕.jpg",
                "顶谷大方制作技艺": "../images/顶谷大方.jpg",
                "观音豆腐制作技艺": "../images/观音豆腐.jpg",
                "五城米酒酿制技艺": "../images/五城米酒.jpg",
                "五城豆腐干制作技艺": "../images/五城豆腐干.jpg",
                "皖南火腿腌制技艺（兰花火腿腌制技艺、汤口火腿腌制技艺）": "../images/皖南火腿.jpg",
                "张一贴内科": "../images/张一贴内科.jpg",
                "西园喉科": "../images/西园喉科.jpg",
                "上九庙会": "../images/上九庙会.jpg",
                "婆溪河灯": "../images/婆溪河灯.jpg",
                "跳钟馗": "../images/跳钟馗.jpg",
                "三阳打秋千": "../images/三阳打秋千.jpg",
                "黟县彩绘壁画": "../images/黟县彩绘壁画.jpg",
                "徽州毛笔制作技艺": "../images/徽州毛笔.jpg",
                "利源手工制麻技艺": "../images/利源手工制麻技艺.jpg",
                "余香石笛制作技艺": "../images/余香石笛.jpg",
                "祁门胡氏骨伤科": "../images/祁门胡氏骨伤科.jpg",
                "齐云山道场表演": "../images/齐云山道场表演.jpg",
                "五福神会": "../images/五福神会.jpg",
                "竹编（徽州竹编）": "../images/徽州竹编.jpg",
                "美溪唢呐": "../images/美溪唢呐.jpg"
            };

            if (!Array.isArray(intangibleData)) {
                container.innerHTML = '<p class="category-empty">数据加载失败，请稍后重试。</p>';
                return;
            }

            const huangshanItems = intangibleData.filter(item =>
                item && typeof item.area === 'string' && item.area.includes('黄山市')
            );
            const uniqueHuangshanItems = huangshanItems.filter((item, index, arr) => {
                const name = (item.name || '').trim();
                return arr.findIndex(v => (v.name || '').trim() === name) === index;
            });

            const grouped = uniqueHuangshanItems.reduce((acc, item) => {
                const key = item.category || '其他';
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            const categories = Object.keys(grouped);
            if (!categories.length) {
                container.innerHTML = '<p class="category-empty">暂无黄山市非遗数据。</p>';
                return;
            }

            // 生成所有分类的 HTML
            categories.forEach((category, index) => {
                const rowId = 'categorySlider' + index;
                const items = grouped[category];
                const cardsHtml = items.map(item => {
                    const image = imageMap[item.name] || '';
                    const safeArea = (item.area || '').replace(/\n/g, ' / ');
                    const safeUnit = item.protectUnit || '未登记';
                    const imageHtml = image
                        ? `<img src="${image}" alt="${item.name}" loading="lazy">`
                        : `<div class="img-fallback">黄山非遗 · ${category}</div>`;
                    return `
                        <div class="heritage-card" data-name="${item.name.replace(/"/g, '&quot;')}">
                            ${imageHtml}
                            <h4>${item.name}</h4>
                            <p>${category}</p>
                            <div class="meta">地区：${safeArea}<br>保护单位：${safeUnit}</div>
                        </div>
                    `;
                }).join('');

                const rowHtml = `
                    <div class="heritage-category">
                        <div class="category-header">
                            <h3 class="category-title">${category}</h3>
                            <div class="category-actions">
                                <span class="category-count">${items.length} 项</span>
                                <button class="slider-btn row-prev" data-row="${rowId}" aria-label="向左滑动"><i class="fa-solid fa-chevron-left"></i></button>
                                <button class="slider-btn row-next" data-row="${rowId}" aria-label="向右滑动"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="category-slider-wrapper">
                            <div class="category-slider" id="${rowId}">
                                ${cardsHtml}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', rowHtml);
            });

            // 全局事件监听（只绑定一次）
            container.addEventListener('click', function(event) {
                const prev = event.target.closest('.row-prev');
                const next = event.target.closest('.row-next');
                const card = event.target.closest('.heritage-card');

                if (prev || next) {
                    const btn = prev || next;
                    const rowId = btn.getAttribute('data-row');
                    const row = document.getElementById(rowId);
                    if (row) {
                        row.scrollBy({ left: prev ? -320 : 320, behavior: 'smooth' });
                    }
                    return;
                }

                if (card) {
                    const name = card.getAttribute('data-name');
                    if (name) {
                           // ========== 新增：调用通用函数记录浏览历史 ==========
                        addBrowseHistory(decodeURIComponent(name));
                        window.location.href = `../detail/detail.html?name=${encodeURIComponent(name)}`;
                    }
                }
            });
        });
    </script>
</body>
