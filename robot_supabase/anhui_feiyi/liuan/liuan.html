    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="../js/auth.js"></script>

    <script src="../js/three-vrm.js"></script>
    <script src="../shuziren/js/vrm-core.js"></script>
    <script src="../shuziren/js/introduce.js"></script>
     <!-- ========== 新增：引入通用浏览历史函数文件 ========== -->

</head>
<body>
<header>
    <h1>智承皖遗</h1>
    <ul>
        <li><a href="../index.html">首页</a></li>
        <li id="user-link"><a href="../denglu-zhuce/denglu-zhuce.html">用户登录与注册</a></li>
        <li><a href="../women/women.html">关于我们</a></li>
        <li><a href="../fenleijiansuo/fenleijiansuo.html">分类检索</a></li>
        <li><a href="../haoyouhudong/haoyouhudong.html">好友互动</a></li>
        <li><a href="../tuisong/tuisong.html">内容推送</a></li>
    </ul>
</header>

    <main>
        <section class="hero-section">
            <img src="../images/皖西大别山民歌.jpg" alt="六安非遗风光" class="hero-img">
            <div class="hero-overlay">
                <h1>六安非遗 · 大别风情</h1>
            </div>
        </section>

        <section class="intro-section">
            <div class="container">
                <div class="intro-row">
                    <div class="intro-img">
                        <img src="../images/寿州锣鼓.jpg" alt="六安非遗场景">
                    </div>
                    <div class="intro-text">
                        <h2>六安市非遗介绍</h2>
                        <h3>什么是六安非遗？</h3>
                        <p>六安地处大别山北麓，江淮之间，人文荟萃。这里有皖西大别山民歌、寿州锣鼓等传统音乐，也有肘歌抬歌、四顶山庙会等民俗活动，更有绿茶制作技艺、舒席制作技艺、豆腐传统制作技艺等代表性传统技艺。</p>
                        <p>六安非遗承载着皖西人民的生活记忆与文化认同，在传承中延续着大别山区的历史文脉与乡土智慧。</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="heritage-slider-section">
            <div class="container">
                <h2 class="section-title">六安非遗精粹</h2>
                <div class="heritage-category-list" id="heritageCategoryList"></div>
                <div id="avatar-container" style="position: absolute; top: 50%; right: 80px; transform: translateY(-50%); width: 220px; height: 330px; z-index: 20; cursor: pointer; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); background: rgba(0,0,0,0.1);">
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p><a href="http://www.anhuify.net/html/Index/index.html">点击这里了解更多安徽非遗文化！</a></p>
    </footer>

    <script src="../js/data.js"></script>
    <script>
        $(document).ready(function() {
            $('.map-img').maphilight({
                fill: true,
                fillColor: 'ffcc00',
                fillOpacity: 0.5,
                stroke: true,
                strokeColor: 'ffffff',
                strokeWidth: 2,
                fade: true
            });
            $('canvas').css('pointer-events', 'none');
        });
  // ========== 核心新增：通用浏览记录函数 ==========
        function addBrowseHistory(name) {
            // 1. 构造蚌埠非遗详情页的完整路径（从profile.html出发）
            const fullPath = `../detail/detail.html?name=${encodeURIComponent(name)}`;
            // 2. 读取已有浏览记录
            let browseHistory = JSON.parse(localStorage.getItem('browseHistory')) || [];
            // 3. 去重：删除同名旧记录，避免重复
            browseHistory = browseHistory.filter(item => item.name !== name);
            // 4. 添加新记录（最新的在最前面）
            browseHistory.unshift({
                name: name,
                time: new Date().toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit', 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                }), // 格式化时间，显示更规范
                path: fullPath // 关键：存储带参数的真实跳转路径
            });
            // 5. 限制最多存储20条记录，防止数据冗余
            browseHistory = browseHistory.slice(0, 20);
            // 6. 保存回本地存储
            localStorage.setItem('browseHistory', JSON.stringify(browseHistory));
        }
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('heritageCategoryList');
            const imageMap = {
                "皖西大别山民歌": "../images/皖西大别山民歌.jpg",
                "寿州锣鼓": "../images/寿州锣鼓.jpg",
                "金寨古碑丝弦锣鼓": "../images/金寨古碑丝弦锣鼓.jpg",
                "肘歌抬歌": "../images/肘歌抬歌.jpg",
                "锣鼓书": "../images/锣鼓书.jpg",
                "紫金砚制作技艺": "../images/紫金砚制作技艺.jpg",
                "豆腐传统制作技艺": "../images/豆腐传统制作技艺.jpg",
                "舒席制作技艺": "../images/舒席制作技艺.jpg",
                "绿茶制作技艺（黄山毛峰、太平猴魁、屯溪绿茶、松萝茶、六安瓜片、霍山黄芽）": "../images/绿茶制作技艺（黄山毛峰、太平猴魁、屯溪绿茶、松萝茶、六安瓜片、霍山黄芽）.jpg",
                "思帝乡锣鼓": "../images/思帝乡锣鼓.jpg",
                "小调胡琴书": "../images/小调胡琴书.jpg",
                "淮河柳编工艺\n（黄岗柳编、霍邱柳编）": "../images/淮河柳编工艺_（黄岗柳编、霍邱柳编）.jpg",
                "大救驾制作工艺": "../images/大救驾制作工艺.jpg",
                "迎驾酒传统酿造技艺": "../images/迎驾酒传统酿造技艺.jpg",
                "四顶山庙会": "../images/四顶山庙会.jpg",
                "梁山伯与祝英台的传说": "../images/梁山伯与祝英台的传说.jpg",
                "安丰塘的传说": "../images/安丰塘的传说.jpg",
                "四弦书": "../images/四弦书.jpg",
                "寿州大鼓": "../images/寿州大鼓.jpg",
                "淮词": "../images/淮词.jpg",
                "石斛泡制技艺": "../images/石斛泡制技艺.jpg",
                "邀大岭": "../images/邀大岭.jpg",
                "绿茶制作技艺（岳西翠兰、舒城小兰花、涌溪火青）": "../images/绿茶制作技艺（岳西翠兰、舒城小兰花、涌溪火青）.jpg",
                "六安灯歌": "../images/六安灯歌.jpg"
            };

            if (!Array.isArray(intangibleData)) {
                container.innerHTML = '<p class="category-empty">数据加载失败，请稍后重试。</p>';
                return;
            }

            const cityItems = intangibleData.filter(item =>
                item && typeof item.area === 'string' && item.area.includes('六安市')
            );
            const uniqueCityItems = cityItems.filter((item, index, arr) => {
                const name = (item.name || '').trim();
                return arr.findIndex(v => (v.name || '').trim() === name) === index;
            });

            const grouped = uniqueCityItems.reduce((acc, item) => {
                const key = item.category || '其他';
                if (!acc[key]) acc[key] = [];
                acc[key].push(item);
                return acc;
            }, {});

            const categories = Object.keys(grouped);
            if (!categories.length) {
                container.innerHTML = '<p class="category-empty">暂无六安市非遗数据。</p>';
                return;
            }

            categories.forEach((category, index) => {
                const rowId = 'categorySlider' + index;
                const items = grouped[category];
                const cardsHtml = items.map(item => {
                    const image = imageMap[item.name] || '';
                    const safeArea = (item.area || '').replace(/\n/g, ' / ');
                    const safeUnit = item.protectUnit || '未登记';
                    const imageHtml = image
                        ? `<img src="${image}" alt="${item.name}" loading="lazy">`
                        : `<div class="img-fallback">六安非遗 · ${category}</div>`;
                    return `
                        <div class="heritage-card" data-name="${item.name.replace(/"/g, '&quot;')}">
                            ${imageHtml}
                            <h4>${item.name}</h4>
                            <p>${category}</p>
                            <div class="meta">地区：${safeArea}<br>保护单位：${safeUnit}</div>
                        </div>
                    `;
                }).join('');

                const rowHtml = `
                    <div class="heritage-category">
                        <div class="category-header">
                            <h3 class="category-title">${category}</h3>
                            <div class="category-actions">
                                <span class="category-count">${items.length} 项</span>
                                <button class="slider-btn row-prev" data-row="${rowId}" aria-label="向左滑动"><i class="fa-solid fa-chevron-left"></i></button>
                                <button class="slider-btn row-next" data-row="${rowId}" aria-label="向右滑动"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="category-slider-wrapper">
                            <div class="category-slider" id="${rowId}">
                                ${cardsHtml}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', rowHtml);
            });

            container.addEventListener('click', function(event) {
                const prev = event.target.closest('.row-prev');
                const next = event.target.closest('.row-next');
                const card = event.target.closest('.heritage-card');

                if (prev || next) {
                    const btn = prev || next;
                    const rowId = btn.getAttribute('data-row');
                    const row = document.getElementById(rowId);
                    if (row) {
                        row.scrollBy({ left: prev ? -320 : 320, behavior: 'smooth' });
                    }
                    return;
                }

                if (card) {
                    const name = card.getAttribute('data-name');
                    if (name) {
                           // ========== 新增：调用通用函数记录浏览历史 ==========
                        addBrowseHistory(decodeURIComponent(name));
                        window.location.href = `../detail/detail.html?name=${encodeURIComponent(name)}`;
                    }
                }
            });
        });
    </script>
</body>
</html>
