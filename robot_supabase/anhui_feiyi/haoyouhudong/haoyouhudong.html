<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好友互动 - 智承皖遗</title>
    <link rel="stylesheet" href="haoyouhudong.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<header>
    <h1>智承皖遗</h1>
    <ul>
        <li><a href="../index.html">首页</a></li>
        <li id="user-link"></li> 
        <li><a href="../women/women.html">关于我们</a></li>
        <li><a href="../fenleijiansuo/fenleijiansuo.html">分类检索</a></li>
        <li><a href="haoyouhudong.html">好友互动</a></li>
        <li><a href="../tuisong/tuisong.html">内容推送</a></li>
    </ul>
</header>

    <div class="main-content">
        <div class="friends-sidebar">
            <div class="friends-header">
                <h3><i class="fas fa-user-friends"></i> 我的好友</h3>
                <button class="add-friend-btn" id="openAddFriendModal"><i class="fas fa-user-plus"></i> 添加好友</button>
            </div>
            <div class="friends-list" id="friendsList">
                <div class="empty-friends">加载中...</div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <i class="fas fa-comments"></i> 请选择好友开始聊天
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="empty-chat">点击左侧好友开始聊天</div>
            </div>
            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <textarea id="chatInput" rows="2" placeholder="输入消息..."></textarea>
                <button id="sendMessageBtn"><i class="fas fa-paper-plane"></i> 发送</button>
            </div>
        </div>

        <div class="community-sidebar">
            <div class="community-header">
                <h3><i class="fas fa-globe"></i> 非遗社区</h3>
                <button class="post-btn" id="openPostModal"><i class="fas fa-pen"></i> 发帖子</button>
            </div>
            <div class="posts-list" id="postsList">
                <div class="empty-friends">加载中...</div>
            </div>
        </div>
    </div>

    <div id="addFriendModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3><i class="fas fa-user-plus"></i> 添加好友</h3>
            <div class="search-tabs">
                <button class="tab-btn active" data-tab="search">🔍 搜索用户</button>
                <button class="tab-btn" data-tab="recommend">🎯 标签推荐</button>
            </div>
            
            <div id="searchTab" class="tab-pane active">
                <input type="text" id="searchUserInput" placeholder="搜索账号/昵称" class="search-input">
                <button id="searchUserBtn" class="search-btn">搜索</button>
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div id="recommendTab" class="tab-pane">
                <p class="tip-text"><i class="fas fa-info-circle"></i> 根据您喜爱的非遗标签推荐有共同爱好的用户</p>
                <div id="recommendResults" class="recommend-results"></div>
            </div>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3><i class="fas fa-pen"></i> 发布帖子</h3>
            <input type="text" id="postTitle" placeholder="标题" class="post-title-input">
            <textarea id="postContent" rows="5" placeholder="分享你的非遗体验..."></textarea>
            <select id="postCategory" class="post-category">
                <option value="">选择分类</option>
                <option value="传统技艺">传统技艺</option>
                <option value="传统音乐">传统音乐</option>
                <option value="传统舞蹈">传统舞蹈</option>
                <option value="传统戏剧">传统戏剧</option>
                <option value="民间文学">民间文学</option>
                <option value="民俗">民俗</option>
                <option value="传统美术">传统美术</option>
                <option value="传统医药">传统医药</option>
            </select>
            <button id="submitPostBtn" class="submit-post-btn">发布帖子</button>
        </div>
    </div>

    <div id="commentModal" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:9999;">
        <div style="background:#fff; border-radius:12px; width:280px; padding:24px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.2);">
            <p id="modalText" style="font-size:16px; margin:0 0 16px 0;">请选择操作</p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button id="modalLeftBtn" style="padding:10px 20px; border:none; border-radius:8px; background:#4D72FF; color:white; cursor:pointer;">确定</button>
                <button id="modalRightBtn" style="padding:10px 20px; border:none; border-radius:8px; background:#f5f5f5; cursor:pointer;">取消</button>
            </div>
        </div>
    </div>

    <footer>
        <p><a href="http://www.anhuify.net/html/Index/index.html">点击这里了解更多安徽非遗文化！</a></p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/haoyouhudong.js"></script>
</body>
</html>
